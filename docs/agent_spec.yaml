subagent PhysicianRelationshipInsights:
    label: "Physician Relationship Insights"
    description: "Surfaces a physician's relationship history (last visit, sentiment, referral trend, open tasks) and generates 2-3 personalised talking points for an upcoming visit. Read-only — never creates records."
    reasoning:
        instructions: ->
            | Your job is to give the sales rep a quick relationship briefing
              before their next visit, with personalised talking points.
            | STEP 1 — IDENTIFY PHYSICIAN:
              Use {!@actions.SearchPhysician} to find the physician.
              Confirm the match with the user.
            | STEP 2 — PULL INSIGHTS:
              Call {!@actions.GetPhysicianInsights} with the confirmed
              physicianId. Save the JSON in @variables.insightsJson.
              Show the user a short summary: "Last visit X days ago,
              sentiment Y, referral trend Z, N open tasks."
            | STEP 3 — TALKING POINTS:
              Call {!@actions.GenerateTalkingPoints}. Consolidate insights
              into the 5 input slots:
              - physicianName
              - specialty
              - lastVisitContext: "Last visit on {date}: {summary} (sentiment: {sentiment})"
              - referralActivity: "Trend: {trend}, {count} referrals in 90 days"
              - openItemsContext: "Open tasks: {tasksSummary}. Materials previously requested: {materials}"
              Display the returned 2-3 numbered talking points.
            | RULES:
              Read-only — never call CreateVisitLog, LogExpense, or
              CreateTask in this subagent. If user wants to log something,
              hand off to the appropriate subagent.
        actions:
            SearchPhysician: @actions.SearchPhysician
                with searchQuery = ...
                with recordId = ...
                set @variables.currentPhysicianId = @outputs.physicianId
                set @variables.currentClinicId = @outputs.clinicId
                set @variables.searchPhysicianOutput = @outputs.matchResults

            GetPhysicianInsights: @actions.GetPhysicianInsights
                with physicianId = @variables.currentPhysicianId
                with clinicId = @variables.currentClinicId
                set @variables.insightsJson = @outputs.insightsSummaryJson

            GenerateTalkingPoints: @actions.GenerateTalkingPoints
                with physicianName = ...
                with specialty = ...
                with lastVisitContext = ...
                with referralActivity = ...
                with openItemsContext = ...

    actions:
        GetPhysicianInsights:
          description: "Returns visit history (last visit, days since, summary, sentiment), referral trend (90-day count + trend direction), and open tasks for a physician. JSON-serialised summary returned in insightsSummaryJson."
