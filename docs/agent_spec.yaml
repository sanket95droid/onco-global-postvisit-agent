system:
  instructions: |
    You are the Onco Global Post-Visit Log Agent — an AI-powered mobile
    assistant for field sales executives. You help automate administrative
    tasks after physician and clinic visits: logging visit notes, creating
    follow-up tasks, tracking expenses, and providing physician relationship
    insights. You are empathetic, efficient, and optimized for mobile
    interactions. Keep responses concise and action-oriented for a field
    team on the move.

  messages:
    welcome: |
      Hi! I'm your Post-Visit Log Agent. I can help you log visit notes,
      create follow-up tasks, track expenses, or look up physician history.
      What would you like to do?
    error: "Sorry, something went wrong. Please try again or contact your admin."

config:
  agent_label: "Post-Visit Log Agent"
  developer_name: "OncoGlobal_Post_Visit_Log_Agent"
  description: "AI-powered mobile assistant for Onco Global's sales executives. Automates post-visit logging, follow-up task creation, expense management, and physician relationship insights using Agentforce on Salesforce Health Cloud."
  default_agent_user: "post_visit_log_agent@00dak00000ojjwl394056030.ext"

language:
  default_locale: "en_US"
  additional_locales: "en_GB"
  all_additional_locales: False

variables:
    currentPhysicianId: mutable string
        description: "Stores the HealthcareProvider ID of the physician being visited."
        visibility: "Internal"
    currentClinicId: mutable string
        description: "Stores the HealthcareFacility ID of the clinic being visited."
        visibility: "Internal"
    currentVisitLogId: mutable string
        description: "Stores the Visit_Log__c record ID created in the current session — used to link follow-up tasks and expenses."
        visibility: "Internal"
    searchPhysicianOutput: mutable string
        description: "Stores the formatted match list returned by SearchPhysician, used to disambiguate when multiple physicians match."
        visibility: "Internal"
    parsedVisitNotesJson: mutable string
        description: "Stores the structured JSON returned by ParseVisitNotes prompt template (topics, sentiment, referral interest, etc.)."
        visibility: "Internal"
    extractedTasksJson: mutable string
        description: "Stores the JSON array of follow-up tasks extracted by ExtractFollowUpTasks prompt template."
        visibility: "Internal"
    parsedExpensesJson: mutable string
        description: "Stores the structured JSON returned by ParseExpenses prompt template (text-based expense parsing)."
        visibility: "Internal"
    parsedReceiptJson: mutable string
        description: "Stores the JSON returned by ParseReceiptImage Apex action (Mindee OCR result)."
        visibility: "Internal"
    insightsJson: mutable string
        description: "Stores the JSON from GetPhysicianInsights — last visit, referral trend, open tasks."
        visibility: "Internal"
    receiptContentDocumentId: mutable string
        description: "ContentDocumentId of an attached receipt image (e.g. from a WhatsApp message)."
        visibility: "Internal"

knowledge:
  rag_feature_config_id: ""
  citations_enabled: False
  citations_url: ""

start_agent topic_selector:
    label: "Topic Selector"

    description: "Welcome the sales executive and route to the correct subagent based on their intent: visit logging, task creation, expense management, physician insights, or WhatsApp receipt processing."

    reasoning:
        instructions: ->
            | You are the entry point for the Post-Visit Log Agent.
              Determine the user's intent and route to the correct subagent.
              If the user says something like "log a visit", "just finished a meeting", "I just met", or dictates a voice note, route to VisitNoteLogging.
              If they mention tasks, follow-ups, or reminders (and a Visit Log was just created or is in context), route to AutomatedTaskCreation.
              If they mention expenses, travel, cab, food, ₹ amounts, or attach a receipt image, route to ExpenseManagement.
              If they ask about a physician, clinic history, referrals, past visits, or want talking points before a visit, route to PhysicianRelationshipInsights.
              If the input is from WhatsApp or contains an image attachment, route to WhatsAppDigitalEngagement.
              If the request is a general question about Onco Global policies or products, route to GeneralFAQ.
              If the request is unclear, ask a brief clarifying question.
              The user is auto-authenticated via Salesforce Mobile / Digital Engagement session — no additional verification required.

        actions:
            go_to_VisitNoteLogging: @utils.transition to @subagent.VisitNoteLogging

            go_to_AutomatedTaskCreation: @utils.transition to @subagent.AutomatedTaskCreation

            go_to_ExpenseManagement: @utils.transition to @subagent.ExpenseManagement

            go_to_PhysicianRelationshipInsights: @utils.transition to @subagent.PhysicianRelationshipInsights

            go_to_WhatsAppDigitalEngagement: @utils.transition to @subagent.WhatsAppDigitalEngagement

            go_to_GeneralFAQ: @utils.transition to @topic.GeneralFAQ

            go_to_off_topic: @utils.transition to @topic.off_topic

            go_to_ambiguous_question: @utils.transition to @topic.ambiguous_question

subagent VisitNoteLogging:
    label: "Visit Note Logging"
    description: "Handles voice-to-record logging of physician visit notes. Sales executives dictate or type their visit summary, and the agent transcribes, structures, extracts key entities, and creates a Visit_Log__c record in Health Cloud."
    reasoning:
        instructions: ->
            | Your job is to help the sales executive log their physician
              visit quickly and efficiently using natural language or voice input.
            | STEP 1 — IDENTIFY THE PHYSICIAN:
              Ask which physician or clinic was visited.
              Use {!@actions.SearchPhysician} to look up the physician in
              Health Cloud by name, NPI, or clinic name.
              If multiple matches are found, present a short numbered list
              from @variables.searchPhysicianOutput and ask the user to
              confirm which one.
              Store the confirmed physician ID in @variables.currentPhysicianId
              and clinic in @variables.currentClinicId.
            | STEP 2 — CAPTURE VISIT NOTES:
              Prompt the user to dictate or type their visit summary as a
              free-form natural sentence (e.g. "Met Dr. Mehta at Apollo
              Clinic. Discussed our new radiation therapy program. She's
              interested in referring head and neck cancer cases. Wants the
              brochure. Follow up next Thursday for a lunch meeting.").
            | STEP 3 — STRUCTURE THE NOTES:
              Pass the raw notes to {!@actions.ParseVisitNotes}. Save the
              returned JSON in @variables.parsedVisitNotesJson.
              Show the user a brief structured summary (Topics, Sentiment,
              Referral Interest) extracted from the JSON and ask "Save this
              visit log?".
            | STEP 4 — CREATE VISIT LOG:
              On user confirmation, call {!@actions.CreateVisitLog} with the
              structured fields plus physicianId, clinicId, and current
              user as salesRepId. Save the returned visitLogId in
              @variables.currentVisitLogId.
              Display the confirmation message returned by the flow.
            | STEP 5 — OFFER NEXT STEPS:
              After saving, ask: "Would you like me to create follow-up
              tasks from your notes, log any expenses for this visit, or
              are you all set?". Route accordingly.
            | RULES:
              Keep interactions concise — the user is on mobile.
              Never ask more than one question at a time.
              If dictation is unclear, summarize what you understood and
              ask for confirmation rather than re-asking everything.
              Dates should be interpreted relative to today (e.g. "next Thursday").
        actions:
            SearchPhysician: @actions.SearchPhysician
                with searchQuery = ...
                with recordId = ...
                set @variables.currentPhysicianId = @outputs.physicianId
                set @variables.currentClinicId = @outputs.clinicId
                set @variables.searchPhysicianOutput = @outputs.matchResults

            ParseVisitNotes: @actions.ParseVisitNotes
                with rawNotes = ...
                with physicianName = ...
                with clinicName = ...
                with visitDate = ...
                set @variables.parsedVisitNotesJson = @outputs.response

            CreateVisitLog: @actions.CreateVisitLog
                with physicianId = @variables.currentPhysicianId
                with clinicId = @variables.currentClinicId
                with salesRepId = ...
                with visitSummary = ...
                with rawNotes = ...
                with topicsDiscussed = ...
                with referralInterest = ...
                with specialtiesDiscussed = ...
                with requestedMaterials = ...
                with physicianSentiment = ...
                with followUpActions = ...
                with visitDate = ...
                with visitType = ...
                with channel = ...
                set @variables.currentVisitLogId = @outputs.visitLogId

            go_to_AutomatedTaskCreation: @utils.transition to @subagent.AutomatedTaskCreation

            go_to_ExpenseManagement: @utils.transition to @subagent.ExpenseManagement

    actions:
        SearchPhysician:
          description: "Searches Health Cloud (HealthcareProvider Name/NPI__c, HealthcareFacility Name) via SOSL and returns up to 5 matching physicians and clinics, plus the best match's IDs."
          inputs:
            searchQuery: string
              description: "Physician name, NPI, or clinic name provided by the sales executive."
              label: "Search Query"
              is_required: True
              is_user_input: True
              complex_data_type_name: "lightning__textType"
            recordId: string
              description: "Optional HealthcareProvider Id for direct lookup (skips search)."
              label: "Record Id"
              is_required: False
              is_user_input: False
              complex_data_type_name: "lightning__textType"
          outputs:
            physicianId: string
              description: "The HealthcareProvider record ID of the matched physician."
              label: "Physician ID"
              filter_from_agent: True
              is_displayable: False
            clinicId: string
              description: "The HealthcareFacility record ID of the matched clinic."
              label: "Clinic ID"
              filter_from_agent: True
              is_displayable: False
            matchResults: string
              description: "Formatted numbered list of matching physicians/clinics for confirmation."
              label: "Match Results"
              filter_from_agent: False
              is_displayable: True
          target: "apex://OncoGlobal_SearchPhysician"
          label: "Search Physician or Clinic"
          require_user_confirmation: False
          include_in_progress_indicator: True
          progress_indicator_message: "Searching Health Cloud..."

        ParseVisitNotes:
          description: "Uses the OncoGlobal_ParseVisitNotesTemplate prompt template to parse free-form visit notes into structured JSON: topics discussed, referral interest, specialties, requested materials, follow-up actions, physician sentiment."
          inputs:
            rawNotes: string
              description: "The raw dictated or typed visit notes from the sales executive."
              label: "Raw Visit Notes"
              is_required: True
              is_user_input: True
              complex_data_type_name: "lightning__textType"
            physicianName: string
              description: "Physician name to enrich context (from SearchPhysician)."
              label: "Physician Name"
              is_required: False
              is_user_input: False
              complex_data_type_name: "lightning__textType"
            clinicName: string
              description: "Clinic name to enrich context (from SearchPhysician)."
              label: "Clinic Name"
              is_required: False
              is_user_input: False
              complex_data_type_name: "lightning__textType"
            visitDate: string
              description: "Visit date in ISO format."
              label: "Visit Date"
              is_required: False
              is_user_input: False
              complex_data_type_name: "lightning__textType"
          outputs:
            response: string
              description: "Structured JSON with structuredSummary, topicsDiscussed, referralInterest, specialtiesDiscussed, requestedMaterials, followUpActions, physicianSentiment."
              label: "Parsed Visit Notes JSON"
              filter_from_agent: False
              is_displayable: True
          target: "promptTemplate://OncoGlobal_ParseVisitNotesTemplate"
          label: "Parse Visit Notes with AI"
          require_user_confirmation: False
          include_in_progress_indicator: True
          progress_indicator_message: "Analyzing your notes..."

        CreateVisitLog:
          description: "Creates a Visit_Log__c record linked to the HealthcareProvider, HealthcareFacility, and current user. Returns visitLogId and a confirmation message."
          inputs:
            physicianId: string
              description: "HealthcareProvider record ID."
              label: "Physician ID"
              is_required: True
              is_user_input: False
              complex_data_type_name: "lightning__textType"
            clinicId: string
              description: "HealthcareFacility record ID."
              label: "Clinic ID"
              is_required: False
              is_user_input: False
              complex_data_type_name: "lightning__textType"
            salesRepId: string
              description: "User ID of the sales executive — leave empty to default to running user."
              label: "Sales Rep ID"
              is_required: False
              is_user_input: False
              complex_data_type_name: "lightning__textType"
            visitSummary: string
              description: "AI-generated structured summary of the visit (from ParseVisitNotes.structuredSummary)."
              label: "Visit Summary"
              is_required: False
              is_user_input: False
              complex_data_type_name: "lightning__textType"
            rawNotes: string
              description: "Original dictated text."
              label: "Raw Notes"
              is_required: False
              is_user_input: False
              complex_data_type_name: "lightning__textType"
            topicsDiscussed: string
              description: "Comma-separated topics discussed."
              label: "Topics Discussed"
              is_required: False
              is_user_input: False
              complex_data_type_name: "lightning__textType"
            referralInterest: string
              description: "Referral interest level: High, Medium, Low, None."
              label: "Referral Interest"
              is_required: False
              is_user_input: False
              complex_data_type_name: "lightning__textType"
            specialtiesDiscussed: string
              description: "Oncology specialties discussed."
              label: "Specialties Discussed"
              is_required: False
              is_user_input: False
              complex_data_type_name: "lightning__textType"
            requestedMaterials: string
              description: "Materials requested by the physician."
              label: "Requested Materials"
              is_required: False
              is_user_input: False
              complex_data_type_name: "lightning__textType"
            physicianSentiment: string
              description: "Overall physician sentiment: Positive, Neutral, Negative."
              label: "Physician Sentiment"
              is_required: False
              is_user_input: False
              complex_data_type_name: "lightning__textType"
            followUpActions: string
              description: "Raw extracted follow-up text."
              label: "Follow Up Actions"
              is_required: False
              is_user_input: False
              complex_data_type_name: "lightning__textType"
            visitDate: object
              description: "Date and time of the visit."
              label: "Visit Date"
              is_required: True
              is_user_input: False
              complex_data_type_name: "lightning__dateTimeStringType"
            visitType: string
              description: "Visit type: In-Person, Phone, WhatsApp, Event."
              label: "Visit Type"
              is_required: False
              is_user_input: False
              complex_data_type_name: "lightning__textType"
            channel: string
              description: "Channel: Mobile App, WhatsApp, Web."
              label: "Channel"
              is_required: False
              is_user_input: False
              complex_data_type_name: "lightning__textType"
          outputs:
            visitLogId: string
              description: "The ID of the newly created Visit Log record."
              label: "Visit Log ID"
              filter_from_agent: True
              is_displayable: False
            confirmationMessage: string
              description: "Confirmation message to display to the sales executive."
              label: "Confirmation"
              filter_from_agent: False
              is_displayable: True
          target: "flow://OncoGlobal_CreateVisitLogRecord"
          label: "Create Visit Log"
          require_user_confirmation: True
          include_in_progress_indicator: True
          progress_indicator_message: "Saving visit log..."

subagent AutomatedTaskCreation:
    label: "Automated Task Creation"
    description: "Creates Salesforce Tasks from follow-up commitments mentioned in a visit. Triggered after a visit is logged or by phrases like 'create a task', 'remind me', 'follow up next week'."
    reasoning:
        instructions: ->
            | Your job is to extract follow-up actions from a visit and
              create them as Salesforce Tasks linked to the Visit Log.
            | STEP 1 — EXTRACT TASKS:
              If continuing from VisitNoteLogging, use the followUpActions
              from @variables.parsedVisitNotesJson. Otherwise prompt the
              user to describe the tasks.
              Pass to {!@actions.ExtractFollowUpTasks}. The template returns
              a JSON array of tasks (subject, taskType, dueDate, priority,
              description). Save in @variables.extractedTasksJson.
            | STEP 2 — CONFIRM TASKS:
              Present each extracted task to the user one at a time as a
              short bullet (e.g. "Call Dr. Mehta to confirm referrals — due
              next Thursday — High priority. Create?"). Wait for confirmation.
            | STEP 3 — CREATE EACH:
              For each confirmed task, call {!@actions.CreateTask} with the
              task fields plus relatedVisitLogId from
              @variables.currentVisitLogId. Show the confirmation message.
            | STEP 4 — SUMMARIZE:
              When done, summarize how many tasks were created.
            | RULES:
              Never silently create multiple tasks — always confirm one by one.
              Default due date is 7 days from today if not specified.
              Always link to the current visit log if one exists.
        actions:
            ExtractFollowUpTasks: @actions.ExtractFollowUpTasks
                with todayDate = ...
                with physicianName = ...
                with visitSummary = ...
                with followUpActionsRaw = ...
                set @variables.extractedTasksJson = @outputs.response

            CreateTask: @actions.CreateTask
                with taskSubject = ...
                with dueDate = ...
                with priority = ...
                with taskType = ...
                with description = ...
                with relatedPhysicianId = @variables.currentPhysicianId
                with relatedClinicId = @variables.currentClinicId
                with relatedVisitLogId = @variables.currentVisitLogId
                with salesRepId = ...

    actions:
        ExtractFollowUpTasks:
          description: "Uses the OncoGlobal_ExtractFollowUpTasksTemplate prompt template to extract a JSON array of follow-up tasks (subject, type, dueDate, priority, description) from raw visit text."
          inputs:
            todayDate: string
              description: "Today's date in YYYY-MM-DD for resolving relative dates."
              label: "Today's Date"
              is_required: True
              is_user_input: False
              complex_data_type_name: "lightning__textType"
            physicianName: string
              description: "Physician name for context."
              label: "Physician Name"
              is_required: False
              is_user_input: False
              complex_data_type_name: "lightning__textType"
            visitSummary: string
              description: "Structured summary from ParseVisitNotes."
              label: "Visit Summary"
              is_required: False
              is_user_input: False
              complex_data_type_name: "lightning__textType"
            followUpActionsRaw: string
              description: "Raw follow-up text from the visit notes."
              label: "Follow Up Actions Raw"
              is_required: True
              is_user_input: False
              complex_data_type_name: "lightning__textType"
          outputs:
            response: string
              description: "JSON array of tasks: [{subject, taskType, dueDate, priority, description}, ...]"
              label: "Extracted Tasks JSON"
              filter_from_agent: False
              is_displayable: True
          target: "promptTemplate://OncoGlobal_ExtractFollowUpTasksTemplate"
          label: "Extract Follow-Up Tasks with AI"
          require_user_confirmation: False
          include_in_progress_indicator: True
          progress_indicator_message: "Extracting follow-up tasks..."

        CreateTask:
          description: "Creates a Salesforce Task linked to the Visit Log via WhatId. Sets ActivityDate from dueDate, Priority, Subject, Description, and OwnerId. Returns taskId and confirmation."
          inputs:
            taskSubject: string
              description: "Task subject line (max 80 chars)."
              label: "Task Subject"
              is_required: True
              is_user_input: False
              complex_data_type_name: "lightning__textType"
            dueDate: object
              description: "Task due date (DateTime; date portion is used for ActivityDate)."
              label: "Due Date"
              is_required: True
              is_user_input: False
              complex_data_type_name: "lightning__dateTimeStringType"
            priority: string
              description: "Priority: High, Normal, Low."
              label: "Priority"
              is_required: False
              is_user_input: False
              complex_data_type_name: "lightning__textType"
            taskType: string
              description: "Task type label (Call, Email, Meeting, Send Material, Other)."
              label: "Task Type"
              is_required: False
              is_user_input: False
              complex_data_type_name: "lightning__textType"
            description: string
              description: "Task description / context."
              label: "Description"
              is_required: False
              is_user_input: False
              complex_data_type_name: "lightning__textType"
            relatedPhysicianId: string
              description: "HealthcareProvider Id (stored in description, not WhoId — Task.WhoId only accepts Lead/Contact)."
              label: "Related Physician Id"
              is_required: False
              is_user_input: False
              complex_data_type_name: "lightning__textType"
            relatedClinicId: string
              description: "HealthcareFacility Id."
              label: "Related Clinic Id"
              is_required: False
              is_user_input: False
              complex_data_type_name: "lightning__textType"
            relatedVisitLogId: string
              description: "Visit_Log__c Id — used as Task.WhatId."
              label: "Related Visit Log Id"
              is_required: False
              is_user_input: False
              complex_data_type_name: "lightning__textType"
            salesRepId: string
              description: "Owner of the task. Empty defaults to running user."
              label: "Sales Rep Id"
              is_required: False
              is_user_input: False
              complex_data_type_name: "lightning__textType"
          outputs:
            taskId: string
              description: "Id of the newly created Task."
              label: "Task ID"
              filter_from_agent: True
              is_displayable: False
            confirmationMessage: string
              description: "Confirmation string to show the user."
              label: "Confirmation"
              filter_from_agent: False
              is_displayable: True
          target: "flow://OncoGlobal_CreateFollowUpTask"
          label: "Create Follow-Up Task"
          require_user_confirmation: True
          include_in_progress_indicator: True
          progress_indicator_message: "Creating task..."

subagent ExpenseManagement:
    label: "Expense Management"
    description: "Logs visit-related expenses. Handles both free-text input ('₹380 Ola from Apollo to BKC') and receipt image attachments. Receipt images are OCR'd via Mindee and structured automatically."
    reasoning:
        instructions: ->
            | Your job is to log visit-related expenses as Expense__c records.
            | BRANCH A — RECEIPT IMAGE:
              If the user attached a receipt image (a ContentDocumentId is
              available in @variables.receiptContentDocumentId), call
              {!@actions.ParseReceiptImage} with that ContentDocumentId,
              the current visitLogId, and any visit context. The Apex
              action OCRs via Mindee and creates the Expense__c
              automatically. Show the confirmation message returned.
              No further user confirmation is needed for image OCR — the
              receipt is its own confirmation.
            | BRANCH B — TEXT INPUT:
              If the user described expenses in text (e.g. "₹380 Ola, ₹250
              lunch at Taj Cafe"), pass to {!@actions.ParseExpenses}. The
              template returns a JSON array. Save in
              @variables.parsedExpensesJson. Show each parsed item to the
              user for confirmation, then call {!@actions.LogExpense} for
              each confirmed item.
            | RULES:
              Always link to @variables.currentVisitLogId if it exists.
              Default sales rep is the running user.
              Default currency is INR.
              For multi-line receipts, the receipt OCR action emits one
              Expense__c per receipt with line items summarized in Notes__c.
        actions:
            ParseReceiptImage: @actions.ParseReceiptImage
                with contentDocumentId = @variables.receiptContentDocumentId
                with visitLogId = @variables.currentVisitLogId
                with salesRepId = ...
                with visitContext = ...
                set @variables.parsedReceiptJson = @outputs.parsedJson

            ParseExpenses: @actions.ParseExpenses
                with today = ...
                with visitContext = ...
                with rawExpenseText = ...
                set @variables.parsedExpensesJson = @outputs.response

            LogExpense: @actions.LogExpense
                with amount = ...
                with currency = ...
                with category = ...
                with merchant = ...
                with expenseDate = ...
                with notes = ...
                with relatedVisitLogId = @variables.currentVisitLogId
                with salesRepId = ...
                with ocrConfidence = ...

    actions:
        ParseReceiptImage:
          description: "Sends a receipt image (Salesforce ContentDocument) to the Mindee Receipt Parser via Named Credential NC_Mindee, parses the structured response, and creates an Expense__c record. Returns the new Expense Id, the raw Mindee JSON, and a short confirmation."
          inputs:
            contentDocumentId: string
              description: "ContentDocumentId of the receipt image in Salesforce Files (typically attached to a MessagingSession from WhatsApp or to a Visit Log)."
              label: "Content Document Id"
              is_required: True
              is_user_input: True
              complex_data_type_name: "lightning__textType"
            visitLogId: string
              description: "Optional Visit_Log__c Id to link the resulting Expense to."
              label: "Visit Log Id"
              is_required: False
              is_user_input: False
              complex_data_type_name: "lightning__textType"
            salesRepId: string
              description: "Optional User Id; defaults to running user."
              label: "Sales Rep Id"
              is_required: False
              is_user_input: False
              complex_data_type_name: "lightning__textType"
            visitContext: string
              description: "Optional context string saved on the Expense (e.g. physician name, clinic)."
              label: "Visit Context"
              is_required: False
              is_user_input: False
              complex_data_type_name: "lightning__textType"
          outputs:
            expenseId: string
              description: "Id of the newly created Expense__c record."
              label: "Expense ID"
              filter_from_agent: True
              is_displayable: False
            parsedJson: string
              description: "Raw structured JSON returned by Mindee."
              label: "Parsed JSON"
              filter_from_agent: True
              is_displayable: False
            confirmationMessage: string
              description: "Short confirmation to display to the user."
              label: "Confirmation"
              filter_from_agent: False
              is_displayable: True
          target: "apex://OncoGlobal_ParseReceiptImage"
          label: "Parse Receipt Image (Mindee OCR)"
          require_user_confirmation: False
          include_in_progress_indicator: True
          progress_indicator_message: "Reading receipt..."

        ParseExpenses:
          description: "Uses the OncoGlobal_ParseExpensesTemplate prompt template to convert free-form expense text (e.g. '₹380 Ola, ₹250 lunch at Taj Cafe') into a JSON array of expense items."
          inputs:
            today: string
              description: "Today's date in YYYY-MM-DD."
              label: "Today"
              is_required: True
              is_user_input: False
              complex_data_type_name: "lightning__textType"
            visitContext: string
              description: "Optional visit context (physician, clinic) for grounding."
              label: "Visit Context"
              is_required: False
              is_user_input: False
              complex_data_type_name: "lightning__textType"
            rawExpenseText: string
              description: "Free-form expense text from the user."
              label: "Raw Expense Text"
              is_required: True
              is_user_input: True
              complex_data_type_name: "lightning__textType"
          outputs:
            response: string
              description: "JSON array of expense items: [{amount, currency, category, merchant, expenseDate, notes}, ...]"
              label: "Parsed Expenses JSON"
              filter_from_agent: False
              is_displayable: True
          target: "promptTemplate://OncoGlobal_ParseExpensesTemplate"
